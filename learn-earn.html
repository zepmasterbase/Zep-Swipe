<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Learn & Earn</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px;margin:16px;border-radius:16px;
  background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));
}
.brand{
  font-family:Orbitron;font-size:1.5rem;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.home-btn{
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--violet));
  color:#050015;font-size:18px;
}

/* CONTAINER */
.container{max-width:1100px;margin:auto;padding:16px;display:flex;flex-direction:column;gap:24px;}

/* PROFILE */
.profile{display:flex;align-items:center;gap:16px;background:var(--glass);padding:16px;border-radius:16px;}
.profile img{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover;}
.profile h3{font-family:Orbitron;font-size:1.3rem;}
.profile span{opacity:.8;font-size:.9rem;}

/* COURSES GRID */
.courses{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
.course{
  background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  padding:18px;
  cursor:pointer;
  overflow:hidden;
  transition:transform .4s, box-shadow .4s;
  animation:pulseBG 2s infinite alternate;
  position:relative;
}
.course:hover{transform:translateY(-6px);box-shadow:0 0 30px var(--blue),0 0 50px var(--violet);}
.course.selected{border:2px solid var(--green);box-shadow:0 0 40px var(--green);}
.course h4{font-family:Orbitron;margin-bottom:8px;font-size:1.1rem;}
.course span{font-size:.85rem;color:var(--text-light);}

/* TASKS */
.tasks{background:var(--glass);padding:18px;border-radius:18px;animation:fadeIn 0.5s;}
.task{background:rgba(255,255,255,.05);padding:14px;border-radius:14px;margin-bottom:14px;position:relative;transition:transform .3s;}
.task.completed{opacity:.6;}
.task button{margin-top:10px;padding:10px 14px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));cursor:pointer;font-family:Orbitron;transition:.3s;}
.task button:hover{transform:translateY(-2px);box-shadow:0 0 10px var(--blue),0 0 20px var(--violet);}

/* PROGRESS BAR */
.progress-container{background:rgba(255,255,255,.05);border-radius:12px;height:12px;margin-top:8px;}
.progress-bar{height:100%;border-radius:12px;background:var(--green);width:0%;transition:width .4s;}

/* PORTFOLIO DASHBOARD */
.portfolio{display:flex;flex-wrap:wrap;gap:12px;}
.portfolio-card{flex:1 1 200px;background:var(--glass);padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);}
.portfolio-card h4{font-family:Orbitron;margin-bottom:6px;}
.portfolio-card span{font-size:.85rem;color:var(--text-light);}
.score-bar{height:10px;background:var(--yellow);border-radius:12px;width:0%;transition:width .5s;}

/* ANIMATIONS */
@keyframes pulseBG{
  0%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}
  50%{background:linear-gradient(135deg, rgba(0,240,255,0.25), rgba(156,77,255,0.25));}
  100%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}
}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}

@media(max-width:600px){.profile{flex-direction:column;text-align:center;}}
</style>
</head>
<body>

<header>
  <div class="brand">Zep Swipe</div>
  <button class="home-btn" onclick="location.href='student-dashboard.html'">🏠</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="profile">
    <img id="profileImg">
    <div>
      <h3 id="studentName"></h3>
      <span id="studentUniversity"></span><br>
      <span id="walletBalance"></span>
    </div>
  </div>

  <!-- COURSES -->
  <div class="courses" id="courseList"></div>

  <!-- TASKS -->
  <div class="tasks" id="taskSection" style="display:none">
    <h3 id="courseTitle"></h3>
    <div id="tasksContainer"></div>
  </div>

  <!-- PORTFOLIO DASHBOARD -->
  <div class="portfolio" id="portfolioDashboard"></div>

</div>

<script>
/* ====================== SESSION ====================== */
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) location.href="login.html";
let user = users[currentUserId];

/* ====================== PROFILE ====================== */
profileImg.src = user.profileImage || "https://via.placeholder.com/80";
document.getElementById("studentName").innerText = user.name;
document.getElementById("studentUniversity").innerText = user.university || "";
document.getElementById("walletBalance").innerText = `Wallet: ${user.walletBalance||0} ZAC`;

/* ====================== COURSES ====================== */
const courses = {
  "Virtual Assistant": ["Inbox & calendar mgmt","Client research","Scheduling tools","Admin workflow","Client simulation"],
  "Data Entry": ["Spreadsheet basics","CRM tools","Accuracy training","Speed drills","Client simulation"],
  "Student Travel Agent": ["Record intro video + submit Zora link","Local sightseeing research","Customer service basics","Promote local experiences","Simulate booking workflow"],
  "Graphic Design Foundation":["Color theory","Typography","Layout design","Branding basics","Portfolio build"],
  "Web & No-Code Development":["HTML/CSS basics","No-code tools intro","Build landing page","Responsive design","Portfolio project"],
  "AI & Prompt Engineering":["AI basics","Prompt writing","Tool experimentation","AI project","Portfolio showcase"],
  "Digital Marketing & Ads":["SEO fundamentals","Ad campaigns","Social media strategy","Analytics review","Portfolio project"],
  "Remote Customer Support":["Ticket management","CRM use","Customer communication","Conflict resolution","Simulation project"]
};

if(!user.learnEarn) user.learnEarn={course:null,completed:{},lastCompleted:Date.now()}; 

/* ====================== RENDER COURSES ====================== */
const courseList=document.getElementById("courseList");
let currentCourse=null;

function renderCourses(){
  courseList.innerHTML="";
  Object.keys(courses).forEach(c=>{
    const div=document.createElement("div");
    div.className="course";
    div.innerHTML=`<h4>${c}</h4><span>21-Day Client-Ready Program</span>`;
    if(currentCourse===c) div.classList.add("selected");
    div.onclick=()=>{currentCourse=c;selectCourse(c);};
    courseList.appendChild(div);
  });
}
renderCourses();

function selectCourse(course){
  user.learnEarn.course=course;
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  renderTasks();
}

/* ====================== TASKS ====================== */
const taskSection=document.getElementById("taskSection");
const tasksContainer=document.getElementById("tasksContainer");

function renderTasks(){
  taskSection.style.display="block";
  document.getElementById("courseTitle").innerText = user.learnEarn.course;
  tasksContainer.innerHTML="";

  const courseTasks=courses[user.learnEarn.course];
  const completedDays=user.learnEarn.completed[user.learnEarn.course]||[];

  for(let day=1;day<=21;day++){
    const div=document.createElement("div");
    div.className="task";

    // Determine task text
    let taskText="";
    if(day===1){
      taskText=`Record intro video, submit Zora link, then complete on Zep Swipe to earn.`;
    }else{
      taskText=`Day ${day}: ${courseTasks[(day-2)%courseTasks.length]}`;
    }

    // Check time lock
    let unlocked=true;
    if(day>1){
      const last=completedDays[completedDays.length-1]||0;
      const nextUnlock=last+24*60*60*1000;
      if(Date.now()<nextUnlock) unlocked=false;
    }

    if(completedDays.includes(day)) div.classList.add("completed");

    div.innerHTML=`<strong>Day ${day}</strong><p>${taskText}</p>`;

    if(!completedDays.includes(day)){
      const btn=document.createElement("button");
      btn.innerText=unlocked?"Submit Task":"Locked - Countdown";
      if(!unlocked){
        // Countdown timer
        const interval=setInterval(()=>{
          const last=completedDays[completedDays.length-1]||0;
          const nextUnlock=last+24*60*60*1000;
          const remaining=Math.max(0,nextUnlock-Date.now());
          const hrs=Math.floor(remaining/3600000);
          const mins=Math.floor((remaining%3600000)/60000);
          const secs=Math.floor((remaining%60000)/1000);
          btn.innerText=`Locked - ${hrs}h ${mins}m ${secs}s`;
          if(remaining<=0){
            clearInterval(interval);
            btn.innerText="Submit Task";
          }
        },1000);
      } else {
        btn.onclick=()=>completeTask(day);
      }
      div.appendChild(btn);
    } else div.innerHTML+=`<span style="color:#00ff94">✔ Completed</span>`;

    tasksContainer.appendChild(div);
  }
}

/* ====================== COMPLETE TASK ====================== */
function completeTask(day){
  const completedDays=user.learnEarn.completed[user.learnEarn.course]||[];
  if(completedDays.includes(day)) return;

  // For Day 1, verify Zora link (simulate verification)
  if(day===1){
    const valid=confirm("Have you submitted the Zora link? Click OK to verify.");
    if(!valid){ alert("Day 1 task requires Zora link verification."); return; }
  }

  completedDays.push(day);
  user.learnEarn.completed[user.learnEarn.course]=completedDays;
  user.learnEarn.lastCompleted=Date.now();
  user.tasksCompleted = (user.tasksCompleted||0)+1;
  user.walletBalance = (user.walletBalance||0)+25;

  // Day 21 verification payment
  if(day===21){
    if(user.country==="GH") alert("Pay 15 GHS via Momo/Paystack.");
    else alert("Pay $15 via Paystack (converted to local currency).");
    user.verified=true;
  }

  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));

  alert("+25 ZAC earned!");
  renderTasks();
  renderPortfolio();
}

/* ====================== PORTFOLIO DASHBOARD ====================== */
const portfolioDashboard=document.getElementById("portfolioDashboard");
function renderPortfolio(){
  portfolioDashboard.innerHTML="";
  Object.keys(courses).forEach(c=>{
    const total=21;
    const completed=(user.learnEarn.completed[c]||[]).length;
    const percent=Math.floor((completed/total)*100);
    const card=document.createElement("div");
    card.className="portfolio-card";
    card.innerHTML=`
      <h4>${c}</h4>
      <div class="progress-container">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
      <span>${percent}% Complete | ${completed*25} ZAC | ${user.verified?"✔ Verified":""}</span>
    `;
    portfolioDashboard.appendChild(card);
  });
}
renderPortfolio();
if(user.learnEarn.course) renderTasks();

</script>
</body>
</html>
