<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Learn & Earn</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;}
button{cursor:pointer;transition:.3s;}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px;margin:16px;border-radius:16px;
  background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));
}
.brand{
  font-family:Orbitron;font-size:1.5rem;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.home-btn{
  width:46px;height:46px;border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--blue),var(--violet));
  color:#050015;font-size:20px;
}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:16px;display:flex;flex-direction:column;gap:24px}

/* PROFILE */
.profile{
  display:flex;align-items:center;gap:14px;
  background:var(--glass);padding:14px;border-radius:14px;
}
.profile img{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover;}
.profile h3{font-family:Orbitron;margin-bottom:2px;}

/* COURSES GRID */
.courses{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}
.course{
  background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  padding:18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .3s, box-shadow .3s;
  animation: pulseBG 2s infinite alternate;
}
.course:hover{transform:translateY(-6px);box-shadow:0 0 30px var(--blue),0 0 50px var(--violet);}
.course.selected{border:2px solid var(--green);box-shadow:0 0 40px var(--green);}
@keyframes pulseBG{
  0%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}
  50%{background:linear-gradient(135deg, rgba(0,240,255,0.25), rgba(156,77,255,0.25));}
  100%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}
}

/* TASKS */
.tasks{background:var(--glass);padding:18px;border-radius:18px;}
.task{background:rgba(255,255,255,.05);padding:14px;border-radius:14px;margin-bottom:12px;position:relative;}
.task.completed{opacity:.6;}
.task button{margin-top:10px;padding:10px 14px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;}

/* PROGRESS & PORTFOLIO */
.progress-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:999px;background:var(--green);width:0%;transition:.5s;}
.portfolio{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:.85rem;}

/* FREELANCER READINESS */
.freelancer-score{
  background:var(--glass);padding:16px;border-radius:18px;text-align:center;margin-top:12px;
}

/* DASHBOARD PROGRESS */
.dashboard-progress{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;}
.dashboard-course{flex:1 1 260px;background:var(--glass);padding:14px;border-radius:14px;position:relative;transition:.3s;}
.dashboard-course h4{margin-bottom:6px;}
.verified-badge{position:absolute;top:10px;right:10px;color:var(--green);font-weight:700;}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--glass);padding:24px;border-radius:16px;max-width:400px;width:90%;position:relative;}
.modal input{width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:12px;}
.modal button{padding:10px 16px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;cursor:pointer;}
.modal .close-btn{position:absolute;top:10px;right:14px;cursor:pointer;font-size:18px;font-weight:700;color:#fff;}

/* MOBILE */
@media(max-width:600px){.profile{flex-direction:column;text-align:center;}.courses{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="brand">Zep Swipe</div>
  <button class="home-btn" onclick="location.href='student-dashboard.html'">🏠</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="profile">
    <img id="profileImg">
    <div>
      <h3 id="studentName"></h3>
      <span id="studentUniversity"></span>
    </div>
  </div>

  <!-- COURSES -->
  <div class="courses" id="courseList"></div>

  <!-- TASKS -->
  <div class="tasks" id="taskSection" style="display:none">
    <h3 id="courseTitle"></h3>
    <div id="tasksContainer"></div>
    <div class="freelancer-score">
      <strong>Freelancer Readiness:</strong> <span id="readinessScore">0%</span>
    </div>
  </div>

  <!-- DASHBOARD PROGRESS -->
  <div class="dashboard-progress" id="dashboardProgress"></div>
</div>

<!-- MODAL FOR LINK SUBMISSION -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h3 id="modalTitle">Submit Your Portfolio Link</h3>
    <input type="url" id="taskLinkInput" placeholder="Paste your Zora portfolio link" />
    <button onclick="confirmLink()">Submit</button>
  </div>
</div>

<script>
/* ======================
   SESSION & PROFILE
====================== */
let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUserId=localStorage.getItem("currentUserId");
if(!currentUserId||!users[currentUserId]) location.href="login.html";
let user=users[currentUserId];

profileImg.src=user.profileImage||"https://via.placeholder.com/80";
document.getElementById('studentName').innerText=user.name;
document.getElementById('studentUniversity').innerText=user.university||"";

/* ======================
   COURSES DATA - Real portfolio exercises
====================== */
const coursesData = {
  "Virtual Assistant": [
    "Organize a client's inbox & schedule demo task on Zora",
    "Perform client research & submit report on Zora",
    "Schedule appointments using tools & post proof",
    "Create admin workflow example & upload link",
    "Simulate client communication & submit example",
    "Manage sample project & share link",
    "Create virtual assistant portfolio task 7",
    "Portfolio task 8",
    "Portfolio task 9",
    "Portfolio task 10",
    "Portfolio task 11",
    "Portfolio task 12",
    "Portfolio task 13",
    "Portfolio task 14",
    "Portfolio task 15",
    "Portfolio task 16",
    "Portfolio task 17",
    "Portfolio task 18",
    "Portfolio task 19",
    "Portfolio task 20",
    "Portfolio task 21"
  ],
  "Data Entry": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete data entry portfolio exercise #${i} and submit link on Zora`),
  "Student Travel Agent 🌍": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete travel agent portfolio task #${i} on Zora & submit link`),
  "Graphic Design Foundation": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete graphic design portfolio task #${i} on Zora & submit link`),
  "Web & No-Code Development": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete web/no-code dev portfolio task #${i} on Zora & submit link`),
  "AI & Prompt Engineering": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete AI & prompt engineering portfolio task #${i} on Zora & submit link`),
  "Digital Marketing & Ads": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete marketing & ads portfolio task #${i} on Zora & submit link`),
  "Remote Customer Support": Array.from({length:21},(_,i)=> i===0 ? "Post intro video on Zora" : `Complete remote support portfolio task #${i} on Zora & submit link`)
};

// Initialize user.learnEarn if missing
if(!user.learnEarn){
  user.learnEarn={course:null,completed:[],portfolio:[],zac:0,freelancerScore:0,verifiedCourses:[]};
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
}

/* ======================
   RENDER COURSES
====================== */
const courseList=document.getElementById("courseList");
let currentCourse=null;
let currentDay=null;

function renderCourses(){
  courseList.innerHTML="";
  Object.keys(coursesData).forEach(course=>{
    const div=document.createElement("div");
    div.className="course";
    div.innerHTML=`<h4>${course}</h4><span>21-Day Client-Ready Program</span>`;
    if(currentCourse===course) div.classList.add("selected");
    div.onclick=()=>selectCourse(course);
    courseList.appendChild(div);
  });
}

function selectCourse(course){
  currentCourse=course;
  document.querySelectorAll('.course').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('.course').forEach(c=>{
    if(c.querySelector('h4').innerText===course) c.classList.add('selected');
  });
  user.learnEarn.course=course;
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  renderTasks();
  renderDashboard();
}

/* ======================
   RENDER TASKS
====================== */
function renderTasks(){
  if(!currentCourse) return;
  const taskSection=document.getElementById("taskSection");
  taskSection.style.display="block";
  document.getElementById("courseTitle").innerText=currentCourse;
  const tasksContainer=document.getElementById("tasksContainer");
  tasksContainer.innerHTML="";

  const completedDays=user.learnEarn.completed.filter(c=>c.course===currentCourse).map(c=>c.day);
  let readiness=Math.floor((completedDays.length/21)*100);
  document.getElementById("readinessScore").innerText=readiness+"%";

  const lastCompleted=user.learnEarn.completed.filter(c=>c.course===currentCourse).sort((a,b)=>b.day-a.day)[0];
  const nextDay=(lastCompleted?lastCompleted.day:0)+1;

  coursesData[currentCourse].forEach((task,idx)=>{
    const day=idx+1;
    const div=document.createElement("div");
    div.className="task"+(completedDays.includes(day)?" completed":"");

    let taskContent=`<strong>Day ${day}</strong><p>${task}</p>`;
    if(completedDays.includes(day)){
      taskContent+=`<span style="color:#00ff94">✔ Completed</span>`;
    } else if(day>nextDay){
      let unlockTime=user.learnEarn.completed.find(c=>c.course===currentCourse && c.day===day-1)?.timestamp+24*60*60*1000 || Date.now()+24*60*60*1000;
      let remaining=unlockTime-Date.now();
      const timerId=setInterval(()=>{
        remaining=unlockTime-Date.now();
        if(remaining<=0){clearInterval(timerId); renderTasks(); return;}
        let h=Math.floor(remaining/3600000), m=Math.floor((remaining%3600000)/60000), s=Math.floor((remaining%60000)/1000);
        if(div.querySelector('.countdown')) div.querySelector('.countdown').innerText=`Unlocks in ${h}h ${m}m ${s}s`;
      },1000);
      taskContent+=`<div class="countdown">Unlocks in calculating...</div>`;
    }

    div.innerHTML=taskContent;

    if(day===nextDay){
      const btn=document.createElement("button");
      btn.innerText="Submit Task Link";
      btn.onclick=()=>openModal(day);
      div.appendChild(btn);
    }

    tasksContainer.appendChild(div);
  });
}

/* ======================
   MODAL HANDLER
====================== */
const modalBg=document.getElementById('modalBg');
const taskLinkInput=document.getElementById('taskLinkInput');
function openModal(day){currentDay=day; modalBg.style.display="flex";}
function closeModal(){modalBg.style.display="none"; taskLinkInput.value="";}
function confirmLink(){
  const link=taskLinkInput.value.trim();
  if(!link||!link.startsWith("http")){alert("Enter a valid link");return;}
  // Save task completion
  user.learnEarn.completed.push({course:currentCourse,day:currentDay,timestamp:Date.now(),link});
  user.learnEarn.zac=(user.learnEarn.zac||0)+25;
  user.learnEarn.freelancerScore=Math.floor((user.learnEarn.completed.filter(c=>c.course===currentCourse).length/21)*100);

  // Day 21 verification
  if(currentDay===21){
    const userLocation=user.country||"GH";
    alert(`Day 21 reached! Pay verification fee via ${userLocation==='GH'?'Momo or Paystack':'Paystack'} (currency adjusted automatically).`);
    user.learnEarn.verifiedCourses.push(currentCourse);
  }

  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  closeModal();
  renderTasks();
  renderDashboard();
  renderCourses();
}

/* ======================
   DASHBOARD PROGRESS
====================== */
function renderDashboard(){
  const dashboard=document.getElementById("dashboardProgress");
  dashboard.innerHTML="";
  Object.keys(coursesData).forEach(course=>{
    const completedDays=user.learnEarn.completed.filter(c=>c.course===course).map(c=>c.day).length;
    const percent=Math.floor((completedDays/21)*100);
    const div=document.createElement("div");
    div.className="dashboard-course";
    div.innerHTML=`
      <h4>${course}</h4>
      <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
      <div class="portfolio">ZAC: ${completedDays*25} | ${percent}% Completed</div>
      ${user.learnEarn.verifiedCourses.includes(course)?'<div class="verified-badge">✔ Verified</div>':''}
    `;
    dashboard.appendChild(div);
  });
}

renderCourses();
if(user.learnEarn.course) selectCourse(user.learnEarn.course);
renderDashboard();
</script>
</body>
</html>
