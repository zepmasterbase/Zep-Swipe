<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Learn & Earn</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;}
button{cursor:pointer;transition:.3s;}
header{display:flex;justify-content:space-between;align-items:center;padding:16px;margin:16px;border-radius:16px;background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));}
.brand{font-family:Orbitron;font-size:1.5rem;background:linear-gradient(90deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.home-btn{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--blue),var(--violet));color:#050015;font-size:20px;}
.container{max-width:1200px;margin:auto;padding:16px;display:flex;flex-direction:column;gap:24px;}
.profile{display:flex;align-items:center;gap:14px;background:var(--glass);padding:14px;border-radius:14px;}
.profile img{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover;}
.profile h3{font-family:Orbitron;margin-bottom:2px;}
.dashboard-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:16px;}
.dashboard-course{background:var(--glass);padding:16px;border-radius:14px;position:relative;transition:.3s;}
.dashboard-course h4{margin-bottom:6px;}
.verified-badge{position:absolute;top:10px;right:10px;color:var(--green);font-weight:700;}
.progress-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:999px;background:var(--green);width:0%;transition:.5s;}
.zac-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:6px;}
.zac-fill{height:100%;border-radius:999px;background:var(--yellow);width:0%;transition:.5s;}
.courses{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.course{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));border-radius:18px;border:1px solid rgba(255,255,255,.12);padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:transform .3s, box-shadow .3s;animation: pulseBG 2s infinite alternate;}
.course:hover{transform:translateY(-6px);box-shadow:0 0 30px var(--blue),0 0 50px var(--violet);}
.course.selected{border:2px solid var(--green);box-shadow:0 0 40px var(--green);}
@keyframes pulseBG{0%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}50%{background:linear-gradient(135deg, rgba(0,240,255,0.25), rgba(156,77,255,0.25));}100%{background:linear-gradient(135deg, rgba(0,240,255,0.15), rgba(156,77,255,0.15));}}
.tasks{background:var(--glass);padding:18px;border-radius:18px;}
.task{background:rgba(255,255,255,.05);padding:14px;border-radius:14px;margin-bottom:12px;position:relative;}
.task.completed{opacity:.6;}
.task button{margin-top:10px;padding:10px 14px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;}
.freelancer-score{background:var(--glass);padding:16px;border-radius:18px;text-align:center;margin-top:12px;}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--glass);padding:24px;border-radius:16px;max-width:400px;width:90%;position:relative;}
.modal input{width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:12px;}
.modal button{padding:10px 16px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;cursor:pointer;}
.modal .close-btn{position:absolute;top:10px;right:14px;cursor:pointer;font-size:18px;font-weight:700;color:#fff;}
@media(max-width:600px){.profile{flex-direction:column;text-align:center;}.courses{grid-template-columns:1fr;}.dashboard-overview{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="brand">Zep Swipe</div>
  <button class="home-btn" onclick="location.href='student-dashboard.html'">🏠</button>
</header>

<div class="container">

  <div class="profile">
    <img id="profileImg">
    <div>
      <h3 id="studentName"></h3>
      <span id="studentUniversity"></span>
    </div>
  </div>

  <!-- DASHBOARD OVERVIEW -->
  <div class="dashboard-overview" id="dashboardOverview"></div>

  <div class="courses" id="courseList"></div>

  <div class="tasks" id="taskSection" style="display:none">
    <h3 id="courseTitle"></h3>
    <div id="tasksContainer"></div>
    <div class="freelancer-score">
      <strong>Freelancer Readiness:</strong> <span id="readinessScore">0%</span>
    </div>
    <div class="zac-bar"><div class="zac-fill" id="zacFill"></div></div>
    <span id="totalZac">ZAC Earned: 0</span>
  </div>

</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h3 id="modalTitle">Submit Your Zora Portfolio Link</h3>
    <input type="url" id="taskLinkInput" placeholder="Paste your Zora link"/>
    <button onclick="confirmLink()">Submit</button>
  </div>
</div>

<script>
// ======= SESSION & PROFILE =======
let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUserId=localStorage.getItem("currentUserId");
if(!currentUserId||!users[currentUserId]) location.href="login.html";
let user=users[currentUserId];
profileImg.src=user.profileImage||"https://via.placeholder.com/80";
document.getElementById('studentName').innerText=user.name;
document.getElementById('studentUniversity').innerText=user.university||"";

// ======= COURSES & TASKS (same 21 realistic tasks as before) =======
const coursesData = {/* same as previous 8 courses with 21 tasks */};

// Initialize user.learnEarn
if(!user.learnEarn){
  user.learnEarn={course:null,completed:[],portfolio:[],zac:0,verifiedCourses:[]};
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
}

// ======= DASHBOARD RENDER =======
function renderDashboard(){
  const dash=document.getElementById("dashboardOverview");
  dash.innerHTML="";
  Object.keys(coursesData).forEach(course=>{
    const compDays=user.learnEarn.completed.filter(c=>c.course===course).length;
    const progress=Math.floor((compDays/21)*100);
    const zac=compDays*25;
    const verified=user.learnEarn.verifiedCourses.includes(course);
    const div=document.createElement("div");
    div.className="dashboard-course";
    div.innerHTML=`
      <h4>${course}</h4>
      ${verified?'<span class="verified-badge">✔ Verified</span>':""}
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="zac-bar"><div class="zac-fill" style="width:${(zac/525)*100}%"></div></div>
      <span>ZAC: ${zac}</span>
      <span>Progress: ${progress}%</span>
    `;
    dash.appendChild(div);
  });
}
renderDashboard();

// ======= RENDER COURSES & TASKS SAME AS PREVIOUS CODE =======
let currentCourse=null;
let selectedDay=null;
let modalDay=null;

const courseList=document.getElementById("courseList");
function renderCourses(){
  courseList.innerHTML="";
  Object.keys(coursesData).forEach(course=>{
    const div=document.createElement("div");
    div.className="course";
    div.innerHTML=`<h4>${course}</h4><span>21-Day Portfolio Program</span>`;
    if(currentCourse===course) div.classList.add("selected");
    div.onclick=()=>selectCourse(course);
    courseList.appendChild(div);
  });
}
renderCourses();

function selectCourse(course){
  currentCourse=course;
  document.querySelectorAll('.course').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('.course').forEach(c=>{
    if(c.querySelector('h4').innerText===course) c.classList.add('selected');
  });
  user.learnEarn.course=course;
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  renderTasks();
  renderDashboard();
}

// ======= RENDER TASKS =======
function renderTasks(){
  if(!currentCourse) return;
  const taskSection=document.getElementById("taskSection");
  taskSection.style.display="block";
  document.getElementById("courseTitle").innerText=currentCourse;
  const tasksContainer=document.getElementById("tasksContainer");
  tasksContainer.innerHTML="";

  const completedDays=user.learnEarn.completed.filter(c=>c.course===currentCourse).map(c=>c.day);
  let readiness=Math.floor((completedDays.length/21)*100);
  document.getElementById("readinessScore").innerText=readiness+"%";

  const totalZac=user.learnEarn.zac||0;
  document.getElementById("totalZac").innerText=`ZAC Earned: ${totalZac}`;
  document.getElementById("zacFill").style.width=(totalZac/525*100)+"%"; // Max 25 ZAC x21

  const lastCompleted=user.learnEarn.completed.filter(c=>c.course===currentCourse).sort((a,b)=>b.day-a.day)[0];
  const nextDay=(lastCompleted?lastCompleted.day:0)+1;

  coursesData[currentCourse].forEach((task,idx)=>{
    const day=idx+1;
    const div=document.createElement("div");
    div.className="task"+(completedDays.includes(day)?" completed":"");

    let taskContent=`<strong>Day ${day}</strong><p>${task}</p>`;
    const canSubmit=day===1 || day===nextDay;
    if(!completedDays.includes(day) && canSubmit){
      taskContent+=`<button onclick="openModal(${day})">Submit Zora Link</button>`;
    } else if(!completedDays.includes(day) && !canSubmit){
      const unlockTime=new Date(user.learnEarn.completed.find(c=>c.day===day-1 && c.course===currentCourse)?.time || Date.now());
      unlockTime.setHours(unlockTime.getHours()+24);
      const now=new Date();
      const diff=Math.max(0,(unlockTime-now)/1000);
      const hours=Math.floor(diff/3600);
      const mins=Math.floor((diff%3600)/60);
      taskContent+=`<span>Unlocks in ${hours}h ${mins}m</span>`;
    } else {
      taskContent+=`<span style="color:var(--green)">✔ Completed</span>`;
    }

    div.innerHTML=taskContent;
    tasksContainer.appendChild(div);
  });
}

// ======= MODAL & LINK SUBMISSION =======
function openModal(day){modalDay=day;document.getElementById("modalBg").style.display="flex";}
function closeModal(){modalDay=null;document.getElementById("taskLinkInput").value="";document.getElementById("modalBg").style.display="none";}
function confirmLink(){
  const link=document.getElementById("taskLinkInput").value.trim();
  if(!link){alert("Please paste your Zora link."); return;}
  if(!link.startsWith("http")){alert("Invalid link."); return;}

  user.learnEarn.completed.push({course:currentCourse,day:modalDay,time:Date.now()});
  user.learnEarn.portfolio.push({course:currentCourse,day:modalDay,link:link});
  user.learnEarn.zac=(user.learnEarn.zac||0)+25;

  if(modalDay===21 && !user.learnEarn.verifiedCourses.includes(currentCourse)){
    user.learnEarn.verifiedCourses.push(currentCourse);
    alert("🎉 Final day completed! Verified freelancer for "+currentCourse+" ✅");
    // TODO: Paystack/Momo integration here based on location
  }

  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  closeModal();
  renderTasks();
  renderDashboard();
}
</script>
</body>
</html>
