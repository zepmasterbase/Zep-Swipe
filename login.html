<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Login / Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --zep-blue:#00f0ff;
  --zep-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:var(--bg);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  padding:24px;
  border-radius:20px;
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);
}

/* HEADER */
.brand{
  text-align:center;
  margin-bottom:20px;
  font-family:Orbitron;
  font-size:1.6rem;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

input::placeholder{color:rgba(255,255,255,.6);}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-family:Orbitron;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  color:#050015;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  box-shadow:0 0 20px var(--zep-blue),0 0 40px var(--zep-violet);
}

/* TOGGLE */
.toggle{
  text-align:center;
  margin-top:12px;
  cursor:pointer;
  font-size:.85rem;
  color:#aaa;
}
.toggle:hover{color:#fff;}
</style>
</head>

<body>

<div class="container">

  <div class="brand">Zep Swipe</div>

  <input type="text" id="name" placeholder="Full Name (Signup only)">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleAuth()">Login</button>

  <div class="toggle" onclick="toggleMode()" id="toggleText">
    Don't have an account? Sign up
  </div>

</div>

<script>
let isSignup = false;

// LOAD USERS SAFELY (NO DATA LOSS)
let users = JSON.parse(localStorage.getItem("users")) || {};

// TOGGLE LOGIN / SIGNUP
function toggleMode(){
  isSignup = !isSignup;
  document.querySelector("button").innerText = isSignup ? "Sign Up" : "Login";
  document.getElementById("name").style.display = isSignup ? "block" : "none";
  document.getElementById("toggleText").innerText = isSignup
    ? "Already have an account? Login"
    : "Don't have an account? Sign up";
}

// AUTH FUNCTION
function handleAuth(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please fill all required fields");
    return;
  }

  // SIGNUP
  if(isSignup){
    if(!name){
      alert("Enter your name");
      return;
    }

    // CHECK EXISTING USER
    for(let id in users){
      if(users[id].email === email){
        alert("User already exists. Please login.");
        return;
      }
    }

    // CREATE USER ID
    const userId = "user_" + Date.now();

    users[userId] = {
      id: userId,
      name,
      email,
      password,
      verified:false,
      walletBalance:0,
      zacBalance:0,
      tasksCompleted:0,
      profileCompletion:0,
      freelancerReadiness:0,
      profileImage:"",
      university:"",
      country:"",
      learnEarn:{
        progress:{},
        completed:[],
        zac:0
      }
    };

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUserId", userId);

    alert("Signup successful!");

    // ✅ REDIRECT
    window.location.href = "student-dashboard.html";
  }

  // LOGIN
  else{
    let foundUserId = null;

    for(let id in users){
      if(users[id].email === email && users[id].password === password){
        foundUserId = id;
        break;
      }
    }

    if(!foundUserId){
      alert("Invalid login details");
      return;
    }

    // ✅ SAVE SESSION CORRECTLY
    localStorage.setItem("currentUserId", foundUserId);

    alert("Login successful!");

    // ✅ FORCE REDIRECT
    window.location.href = "student-dashboard.html";
  }
}

// AUTO REDIRECT IF ALREADY LOGGED IN
let currentUserId = localStorage.getItem("currentUserId");
if(currentUserId && users[currentUserId]){
  window.location.href = "student-dashboard.html";
}

// INIT
toggleMode();
</script>

</body>
</html>
