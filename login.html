<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Access Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --zep-blue:#00f0ff;
  --zep-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:var(--bg);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  background:var(--glass);
  padding:28px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 25px rgba(0,240,255,.15);
}

/* BRAND */
.brand{
  text-align:center;
  font-family:Orbitron;
  font-size:1.7rem;
  margin-bottom:20px;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TABS */
.tabs{
  display:flex;
  margin-bottom:20px;
  border-radius:10px;
  overflow:hidden;
}
.tabs button{
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-family:Orbitron;
}
.tabs button.active{
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  color:#050015;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,.05);
  color:#fff;
}

input::placeholder{color:#aaa;}

/* BUTTON */
.submit{
  padding:12px;
  border:none;
  border-radius:999px;
  font-family:Orbitron;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  color:#050015;
  cursor:pointer;
}

/* MESSAGE */
.message{
  margin-top:12px;
  text-align:center;
  font-size:.85rem;
  color:#aaa;
}

/* MOBILE */
@media(max-width:480px){
  .container{margin:12px;}
}
</style>
</head>

<body>

<div class="container">

  <div class="brand">Zep Swipe</div>

  <div class="tabs">
    <button id="loginTab" class="active">Login</button>
    <button id="signupTab">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button class="submit">Login</button>
  </form>

  <!-- SIGNUP -->
  <form id="signupForm" style="display:none;">
    <input type="text" id="signupName" placeholder="Full Name" required>
    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>
    <button class="submit">Create Account</button>
  </form>

  <div class="message" id="msg"></div>

</div>

<script>
// ===== SAFE LOAD USERS (NO DATA LOSS) =====
let users = JSON.parse(localStorage.getItem("users"));

// If corrupted or empty, safely reset
if(!users || typeof users !== "object"){
  users = {};
}

// ===== ELEMENTS =====
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const msg = document.getElementById("msg");

// ===== SWITCH TABS =====
loginTab.onclick = ()=>{
  loginTab.classList.add("active");
  signupTab.classList.remove("active");
  loginForm.style.display="flex";
  signupForm.style.display="none";
  msg.innerText="";
};

signupTab.onclick = ()=>{
  signupTab.classList.add("active");
  loginTab.classList.remove("active");
  signupForm.style.display="flex";
  loginForm.style.display="none";
  msg.innerText="";
};

// ===== SIGNUP (SAFE MERGE) =====
signupForm.addEventListener("submit", e=>{
  e.preventDefault();

  const name = document.getElementById("signupName").value.trim();
  const email = document.getElementById("signupEmail").value.trim().toLowerCase();
  const password = document.getElementById("signupPassword").value;

  if(users[email]){
    msg.innerText="Account already exists. Please login.";
    return;
  }

  const newUser = {
    id:"user_"+Date.now(),
    name,
    email,
    password,
    createdAt:new Date().toISOString(),
    verified:false,
    tasksCompleted:0,
    walletBalance:0,
    zacBalance:0,
    profileImage:"",
    university:"",
    country:"",
    level:"Beginner Freelancer"
  };

  // 🔒 SAFE ADD (DOES NOT TOUCH EXISTING USERS)
  users[email] = newUser;

  localStorage.setItem("users", JSON.stringify(users));

  msg.innerText="Account created successfully. Please login.";
  signupForm.reset();
});

// ===== LOGIN =====
loginForm.addEventListener("submit", e=>{
  e.preventDefault();

  const email = document.getElementById("loginEmail").value.trim().toLowerCase();
  const password = document.getElementById("loginPassword").value;

  const user = users[email];

  if(!user){
    msg.innerText="No account found.";
    return;
  }

  if(user.password !== password){
    msg.innerText="Incorrect password.";
    return;
  }

  // ✅ SESSION SAVE
  localStorage.setItem("currentUserId", user.id);
  localStorage.setItem("currentUserEmail", email);

  msg.innerText="Login successful...";

  setTimeout(()=>{
    window.location.href = "student-dashboard.html";
  },800);
});

// ===== AUTO LOGIN =====
const currentUserId = localStorage.getItem("currentUserId");
if(currentUserId){
  window.location.href = "student-dashboard.html";
}
</script>

</body>
</html>
