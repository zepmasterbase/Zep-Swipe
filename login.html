<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Access</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;font-family:Poppins;margin:0;padding:0;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:var(--bg);color:#fff;}
.card{width:100%;max-width:420px;background:var(--glass);padding:28px;border-radius:18px;box-shadow:0 0 30px rgba(0,240,255,.25);}
.logo{text-align:center;margin-bottom:20px;}
.logo img{width:80px;border-radius:50%;}
h1{text-align:center;margin-bottom:20px;font-family:Orbitron;}
input{width:100%;padding:12px;margin-bottom:14px;border:none;border-radius:10px;background:rgba(255,255,255,0.05);color:#fff;}
button{width:100%;padding:12px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));cursor:pointer;}
.switch{text-align:center;margin-top:10px;color:var(--blue);cursor:pointer;}
</style>
</head>

<body>

<div class="card">
  <div class="logo">
    <img src="https://pe56d.s3.amazonaws.com/o_1jhp2503i1gm41unj1tlt1me117of15.png">
  </div>

  <h1 id="title">Login</h1>

  <input id="name" placeholder="Full Name" style="display:none">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="continueBtn">Continue</button>

  <div class="switch" id="switchMode">
    Don’t have an account? Sign up
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ================= SUPABASE INIT =================
const { createClient } = window.supabase;

const supabase = createClient(
  "https://kmntdmdyvbnzgewjlxcp.supabase.co",
  "PASTE_YOUR_FULL_ANON_KEY_HERE"
);

// ================= STATE =================
let mode = "login";

// ================= ELEMENTS =================
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const title = document.getElementById("title");
const switchMode = document.getElementById("switchMode");
const continueBtn = document.getElementById("continueBtn");

// ================= TOGGLE =================
switchMode.addEventListener("click", () => {
  mode = mode === "login" ? "signup" : "login";

  title.innerText = mode === "login" ? "Login" : "Sign Up";
  nameInput.style.display = mode === "signup" ? "block" : "none";

  switchMode.innerText = mode === "login"
    ? "Don’t have an account? Sign up"
    : "Already have an account? Login";
});

// ================= AUTH =================
continueBtn.addEventListener("click", handleAuth);

async function handleAuth(){
  console.log("Clicked");

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if(!email || !password || (mode==="signup" && !name)){
    alert("Please fill all fields");
    return;
  }

  try {

    // ================= LOGIN =================
    if(mode==="login"){
      console.log("Trying Supabase login...");

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      console.log(data, error);

      if(!error && data?.user){
        console.log("Login success");

        const { data:userProfile } = await supabase
          .from("users")
          .select("*")
          .eq("auth_uid", data.user.id)
          .single();

        localStorage.setItem("currentUser", JSON.stringify(userProfile));

        window.location.href = "student-dashboard.html";
        return;
      }

      // ================= OLD USERS =================
      console.log("Checking old users...");

      const localUsers = JSON.parse(localStorage.getItem("users")) || [];
      const oldUser = localUsers.find(u => u.email === email && u.password === password);

      if(oldUser){
        console.log("Migrating old user...");

        const { data:newAuth, error:authError } = await supabase.auth.signUp({
          email,
          password
        });

        if(authError){
          alert(authError.message);
          return;
        }

        const { data:newProfile, error:insertError } = await supabase
          .from("users")
          .insert([{
            full_name: oldUser.name,
            email: oldUser.email,
            auth_uid: newAuth.user.id,
            wallet_balance: oldUser.wallet || 0,
            zac_balance: oldUser.zac_balance || 0
          }])
          .select()
          .single();

        if(insertError){
          alert(insertError.message);
          return;
        }

        localStorage.setItem("currentUser", JSON.stringify(newProfile));

        alert("Account upgraded!");
        window.location.href = "student-dashboard.html";
        return;
      }

      alert("Invalid credentials");
    }

    // ================= SIGNUP =================
    if(mode==="signup"){
      console.log("Signing up...");

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      if(error){
        alert(error.message);
        return;
      }

      const { data:userProfile, error:insertError } = await supabase
        .from("users")
        .insert([{
          full_name: name,
          email,
          auth_uid: data.user.id,
          wallet_balance: 0
        }])
        .select()
        .single();

      if(insertError){
        alert(insertError.message);
        return;
      }

      localStorage.setItem("currentUser", JSON.stringify(userProfile));

      alert("Signup successful!");
      window.location.href = "student-dashboard.html";
    }

  } catch(err){
    console.error(err);
    alert("Something went wrong");
  }
}

// ================= AUTO LOGIN =================
window.addEventListener("load", async ()=>{
  const { data } = await supabase.auth.getSession();

  if(data.session){
    window.location.href = "student-dashboard.html";
  }
});
</script>

</body>
</html>
