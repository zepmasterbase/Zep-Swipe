<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --zep-blue:#00f0ff;
  --zep-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
  --verified-green:#39ff14;
  --wallet-glow:#00ff94;
  --card-gradient:linear-gradient(135deg, rgba(0,240,255,0.1), rgba(156,77,255,0.1));
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;padding:18px;margin:16px;border-radius:16px;
  background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));
  backdrop-filter:blur(14px);
}
.brand{
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.brand img{
  width:44px;height:44px;object-fit:contain;
}
.brand span{
  font-family:Orbitron;
  font-size:1.5rem;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.logout-btn{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:38px;height:38px;color:#fff;cursor:pointer;transition:.3s;
}
.logout-btn:hover{
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  box-shadow:0 0 12px var(--zep-blue),0 0 24px var(--zep-violet);
}

/* DASHBOARD LAYOUT */
.dashboard{padding:16px;display:flex;flex-direction:column;gap:22px;max-width:1200px;margin:auto;}
.section{background:var(--glass);border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px);}
.section h3{font-family:Orbitron;margin-bottom:14px;}

/* PROFILE */
.profile-summary{
  display:flex;align-items:center;gap:16px;
  background:var(--card-gradient);
  padding:18px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);
  flex-wrap:wrap;
}
.profile-summary img{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
}
.profile-info{flex:1;display:flex;flex-direction:column;gap:6px;}
.profile-info h3{margin:0;display:flex;align-items:center;gap:8px;font-size:1.25rem;}
.profile-info span{font-size:.9rem;color:var(--text-light);}
.verified-badge{
  width:18px;height:18px;background:var(--verified-green);border-radius:50%;
  display:inline-block;box-shadow:0 0 8px var(--verified-green);
}

/* FREELANCER READINESS METER */
.readiness-meter{
  margin-top:4px;height:14px;width:100%;background:rgba(255,255,255,.1);
  border-radius:999px;overflow:hidden;box-shadow:inset 0 0 4px rgba(0,0,0,.3);
}
.readiness-fill{
  height:100%;border-radius:999px;background:var(--wallet-glow);width:0%;transition:.6s;
}

/* WEEKLY GRAPH */
.graph-box{
  position:relative;height:180px;border-radius:14px;
  background:var(--card-gradient);overflow:hidden;cursor:pointer;
  display:flex;align-items:flex-end;gap:8px;padding:16px;flex-wrap:nowrap;
  box-shadow:0 0 12px rgba(0,0,0,.4);
}
.graph-bar{
  flex:1; margin:0 5px; border-radius:8px 8px 0 0;
  position:relative; animation:pulseBar 2s infinite;
  cursor:pointer; transition:.3s;
  background:linear-gradient(180deg,var(--zep-blue),var(--zep-violet));
}
.graph-bar span{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:.75rem;color:var(--text-light);display:none;white-space:nowrap;
  background:rgba(0,0,0,.6);padding:2px 6px;border-radius:6px;
}
.graph-bar:hover span{display:block;}
@keyframes pulseBar{0%,100%{opacity:.7;}50%{opacity:1;}}

/* QUICK ACTIONS */
.actions{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;
}
.actions button{
  border:none;border-radius:20px;padding:18px;font-family:Orbitron;
  background:var(--card-gradient);cursor:pointer;color:#050015;
  font-weight:600;font-size:.95rem;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:.3s;box-shadow:0 0 12px var(--zep-blue),0 0 24px var(--zep-violet);
}
.actions button:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px var(--zep-blue),0 0 40px var(--zep-violet);
}
.actions button span{font-size:1.8rem;margin-bottom:6px;}

/* FLOATING ZEP AI BUTTON */
#zepAIButton{
  position:fixed;bottom:20px;right:20px;
  background:linear-gradient(135deg,var(--zep-blue),var(--zep-violet));
  border:none;border-radius:50%;
  width:60px;height:60px;cursor:pointer;
  font-size:24px;display:flex;justify-content:center;align-items:center;color:#050015;
  box-shadow:0 0 20px var(--zep-blue),0 0 40px var(--zep-violet);
  animation:orbPulse 2s infinite; z-index:1000;
}
@keyframes orbPulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}

/* RESPONSIVE */
@media(max-width:480px){
  .profile-summary{flex-direction:column;align-items:center;text-align:center;}
  .actions{grid-template-columns:1fr;}
  .graph-box{overflow-x:auto;}
}
</style>
</head>
<body>

<header>
  <div class="brand" onclick="location.href='student-dashboard.html'">
    <img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jfnua21qtu1vi2pfom33p641h.png" alt="Zep Swipe Logo">
    <span>Zep Swipe</span>
  </div>
  <button class="logout-btn" onclick="logout()">⎋</button>
</header>

<div class="dashboard">

  <!-- PROFILE SUMMARY -->
  <div class="section profile-summary">
    <img id="profileImg" src="https://via.placeholder.com/80">
    <div class="profile-info">
      <h3 id="studentName">Student Name <span id="verifiedBadge" class="verified-badge" style="display:none;"></span></h3>
      <span id="studentLevel">Beginner Freelancer</span>
      <span id="completionText">Profile Completion: 0%</span>
      <div class="readiness-meter"><div id="readinessFill" class="readiness-fill"></div></div>
      <span id="walletBalance">Wallet: 0 ZAC (~$0)</span>
    </div>
  </div>

  <!-- WEEKLY EARNINGS GRAPH -->
  <div class="section">
    <h3>Weekly Earnings</h3>
    <div class="graph-box" id="weeklyGraph"></div>
  </div>

  <!-- QUICK ACTION BUTTONS -->
  <div class="section actions">
    <button onclick="location.href='learn-earn.html'"><span>📚</span>Earn & Verify</button>
    <button onclick="location.href='swipe-merchants.html'"><span>💼</span>Jobs</button>
    <button onclick="location.href='wallet.html'"><span>💰</span>Wallet</button>
    <button onclick="location.href='profile.html'"><span>👤</span>Profile</button>
    <button onclick="location.href='deals.html'"><span>🎉</span>Deals Day</button>
  </div>

</div>

<!-- FLOATING ZEP AI BUTTON -->
<button id="zepAIButton" title="Zep AI Mentor" onclick="location.href='zep-ai.html'">🤖</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// =======================
// USER SESSION
// =======================
let users = JSON.parse(localStorage.getItem("users"))||{};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) location.href="login.html";
let user = users[currentUserId];

if(user.walletBalance===undefined) user.walletBalance=0;
if(user.zacBalance===undefined) user.zacBalance=0;

// =======================
// ELEMENTS
// =======================
const profileImg = document.getElementById("profileImg");
const studentName = document.getElementById("studentName");
const studentLevel = document.getElementById("studentLevel");
const completionText = document.getElementById("completionText");
const walletBalance = document.getElementById("walletBalance");
const verifiedBadge = document.getElementById("verifiedBadge");
const readinessFill = document.getElementById("readinessFill");
const weeklyGraph = document.getElementById("weeklyGraph");

// PROFILE
profileImg.src = user.profileImage || "https://via.placeholder.com/80";
studentName.innerText = user.name || "Student Name";
studentLevel.innerText = user.level || "Beginner Freelancer";
completionText.innerText = `Profile Completion: ${user.profileCompletion || 0}%`;
readinessFill.style.width = `${user.freelancerReadiness || 0}%`;
walletBalance.innerText = `Wallet: ${user.zacBalance || 0} ZAC (~$${((user.walletBalance||0)*0.014).toFixed(2)})`;
if(user.verified) verifiedBadge.style.display="inline-block";

// WEEKLY GRAPH
let earnings = user.earningsHistory || [0,10,5,15,8,12,20];
weeklyGraph.innerHTML="";
earnings.forEach((val)=>{
  const bar=document.createElement("div");
  bar.className="graph-bar";
  bar.style.height=`${val*5}px`;
  bar.innerHTML=`<span>${val} ZAC</span>`;
  weeklyGraph.appendChild(bar);
});

// WALLET GLOW
function updateWallet(zacChange){
  if(zacChange){
    walletBalance.style.transition="all 0.6s ease";
    walletBalance.style.textShadow=`0 0 12px var(--wallet-glow),0 0 24px var(--wallet-glow)`;
    setTimeout(()=>walletBalance.style.textShadow="none",800);
  }
  walletBalance.innerText = `Wallet: ${user.zacBalance || 0} ZAC (~$${((user.walletBalance||0)*0.014).toFixed(2)})`;
}
updateWallet();

// LOGOUT
function logout(){
  localStorage.removeItem("currentUserId");
  location.href="login.html";
}
</script>

</body>
</html>
