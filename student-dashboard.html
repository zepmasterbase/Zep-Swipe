<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --zep-blue:#00f0ff;
  --zep-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --verified-green:#39ff14;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px;margin:16px;border-radius:16px;
  background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));
  backdrop-filter:blur(14px);
}

.brand{
  display:flex;align-items:center;gap:10px;
  font-family:Orbitron;font-size:1.5rem;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.brand img{
  width:34px;height:34px;border-radius:8px;
}

.logout-btn{
  background:rgba(255,255,255,.1);
  border:none;border-radius:50%;
  width:38px;height:38px;color:#fff;
  cursor:pointer;
}

.dashboard{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:22px;
  max-width:1200px;
  margin:auto;
}

.section{
  background:var(--glass);
  border-radius:16px;
  padding:18px;
  border:1px solid rgba(255,255,255,.12);
}

.section h3{
  font-family:Orbitron;
  margin-bottom:12px;
}

.profile-summary{
  display:flex;
  align-items:center;
  gap:16px;
  background:linear-gradient(90deg,rgba(0,240,255,.1),rgba(156,77,255,.1));
  border-radius:16px;
}

.profile-summary img{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
}

.profile-info span{font-size:.9rem;}

.verified-badge{
  width:16px;height:16px;
  background:var(--verified-green);
  border-radius:50%;
  display:inline-block;
  box-shadow:0 0 8px var(--verified-green);
}

/* WALLET GLOW */
.wallet-glow{
  animation:walletPulse 1.5s ease;
}
@keyframes walletPulse{
  0%{text-shadow:0 0 0px var(--zep-blue);}
  50%{text-shadow:0 0 20px var(--zep-blue);}
  100%{text-shadow:0 0 0px var(--zep-blue);}
}

/* FREELANCER SCORE */
.score-meter{
  height:20px;
  border-radius:12px;
  background:rgba(255,255,255,.1);
  overflow:hidden;
  margin-top:8px;
}
.score-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  transition:width 1s ease;
}

.graph-box{
  display:flex;
  align-items:flex-end;
  gap:8px;
  height:180px;
}

.graph-bar{
  flex:1;
  background:linear-gradient(180deg,var(--zep-blue),var(--zep-violet));
  border-radius:8px 8px 0 0;
  position:relative;
}

.actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:16px;
}

.actions button{
  border:none;border-radius:16px;
  padding:18px;
  font-family:Orbitron;
  background:linear-gradient(135deg,var(--zep-blue),var(--zep-violet));
  cursor:pointer;
  color:#050015;
  font-weight:600;
  font-size:.95rem;
}

@media(max-width:480px){
  .profile-summary{flex-direction:column;text-align:center;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="logo.png" alt="Zep Swipe Logo">
    Zep Swipe
  </div>
  <button class="logout-btn" onclick="logout()">⎋</button>
</header>

<div class="dashboard">

  <!-- PROFILE SUMMARY -->
  <div class="section profile-summary">
    <img id="profileImg" src="https://via.placeholder.com/80">
    <div class="profile-info">
      <h3 id="studentName">
        Student Name 
        <span id="verifiedBadge" style="display:none;" class="verified-badge"></span>
      </h3>
      <span id="studentLevel">Beginner Freelancer</span><br>
      <span id="completionText">Profile Completion: 0%</span><br>
      <span id="walletBalance">Wallet: 0 ZAC (~$0)</span>

      <div style="margin-top:10px;">
        <strong>Freelancer Readiness Score</strong>
        <div class="score-meter">
          <div class="score-fill" id="scoreFill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEKLY EARNINGS -->
  <div class="section">
    <h3>Weekly Earnings</h3>
    <div class="graph-box" id="weeklyGraph"></div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="section actions">
    <button onclick="location.href='learn-earn.html'">📚 Earn & Verify</button>
    <button onclick="location.href='swipe-merchants.html'">💼 Jobs</button>
    <button onclick="location.href='wallet.html'">💰 Wallet</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
    <button onclick="location.href='deals.html'">🎉 Deals Day</button>
  </div>

</div>

<script>

// ================= SESSION SAFE =================
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUserId = localStorage.getItem("currentUserId");

if(!currentUserId || !users[currentUserId]){
  location.href="login.html";
}

let currentUser = users[currentUserId];

// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("currentUserId");
  location.href="login.html";
}

// ================= PROFILE =================
document.getElementById("profileImg").src = currentUser.profileImage || "https://via.placeholder.com/80";
document.getElementById("studentName").childNodes[0].nodeValue = currentUser.name || "Student Name";
document.getElementById("studentLevel").innerText = currentUser.level || "Beginner Freelancer";

if(currentUser.verified){
  document.getElementById("verifiedBadge").style.display="inline-block";
}

// ================= LIVE WALLET SYNC =================
let lastBalance = 0;

function updateWalletLive(){

  // Wallet structure safe fallback
  const wallet = currentUser.wallet || {};
  const zac = wallet.zac || 0;
  const usd = wallet.usd || (zac * 0.014);

  document.getElementById("walletBalance").innerText =
    `Wallet: ${zac} ZAC (~$${usd.toFixed(2)})`;

  // Glow animation when balance increases
  if(zac > lastBalance){
    const walletEl = document.getElementById("walletBalance");
    walletEl.classList.add("wallet-glow");
    setTimeout(()=>walletEl.classList.remove("wallet-glow"),1500);
  }

  lastBalance = zac;
}

// Auto sync every 2 seconds
setInterval(()=>{
  users = JSON.parse(localStorage.getItem("users")) || {};
  currentUser = users[currentUserId];
  if(currentUser){
    updateWalletLive();
  }
},2000);

updateWalletLive();

// ================= PROFILE COMPLETION FROM LEARN & EARN =================
function calculateCompletion(){

  const courses = currentUser.learnEarn || {};
  let totalDays = 0;
  let completedDays = 0;

  Object.values(courses).forEach(course=>{
    totalDays += 21;
    completedDays += (course.completedDays || 0);
  });

  const percent = totalDays ? Math.floor((completedDays/totalDays)*100) : 0;

  document.getElementById("completionText").innerText =
    `Profile Completion: ${percent}%`;

  document.getElementById("scoreFill").style.width = percent + "%";

  // Auto level upgrade
  if(percent >= 80){
    currentUser.level = "Verified Global Freelancer";
    currentUser.verified = true;
    document.getElementById("verifiedBadge").style.display="inline-block";
  }else if(percent >= 40){
    currentUser.level = "Intermediate Freelancer";
  }

  users[currentUserId] = currentUser;
  localStorage.setItem("users", JSON.stringify(users));
}

calculateCompletion();

// ================= WEEKLY GRAPH =================
const weeklyGraph = document.getElementById("weeklyGraph");
const earnings = currentUser.earningsHistory || [5,12,8,20,10,15,25];

earnings.forEach(val=>{
  const bar = document.createElement("div");
  bar.className="graph-bar";
  bar.style.height=(val*4)+"px";
  weeklyGraph.appendChild(bar);
});

</script>

</body>
</html>
