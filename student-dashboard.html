<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe — Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --zep-blue:#00f0ff;
  --zep-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
  --verified-green:#39ff14;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px;margin:16px;border-radius:16px;
  background:radial-gradient(circle at center, rgba(0,240,255,.2), rgba(156,77,255,.2));
  backdrop-filter:blur(14px);
}

.brand{
  display:flex;align-items:center;gap:10px;
  font-family:Orbitron;font-size:1.4rem;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.brand img{
  width:34px;
}

.logout-btn{
  background:rgba(255,255,255,.1);
  border:none;border-radius:50%;
  width:38px;height:38px;color:#fff;
  cursor:pointer;transition:.3s;
}
.logout-btn:hover{
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
}

.dashboard{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:22px;
  max-width:1200px;
  margin:auto;
}

.section{
  background:var(--glass);
  border-radius:16px;
  padding:18px;
  border:1px solid rgba(255,255,255,.12);
}

.section h3{
  font-family:Orbitron;
  margin-bottom:14px;
}

/* PROFILE */
.profile-summary{
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
}

.profile-summary img{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
}

.profile-info h3{
  display:flex;
  align-items:center;
  gap:8px;
}

.verified-badge{
  width:16px;height:16px;
  background:var(--verified-green);
  border-radius:50%;
  box-shadow:0 0 8px var(--verified-green);
}

/* WALLET GLOW */
.wallet-glow{
  animation:walletGlow 1s ease;
}
@keyframes walletGlow{
  0%{text-shadow:0 0 0px transparent;}
  50%{text-shadow:0 0 12px var(--zep-blue);}
  100%{text-shadow:0 0 0px transparent;}
}

/* READINESS METER */
.meter{
  margin-top:12px;
  background:rgba(255,255,255,.1);
  border-radius:30px;
  overflow:hidden;
  height:18px;
}

.meter-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--zep-blue),var(--zep-violet));
  transition:1s ease;
}

/* GRAPH */
.graph-box{
  display:flex;
  align-items:flex-end;
  gap:8px;
  height:180px;
}

.graph-bar{
  flex:1;
  background:linear-gradient(180deg,var(--zep-blue),var(--zep-violet));
  border-radius:8px 8px 0 0;
  transition:.3s;
}

.actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:16px;
}

.actions button{
  border:none;border-radius:16px;padding:18px;
  font-family:Orbitron;
  background:linear-gradient(135deg,var(--zep-blue),var(--zep-violet));
  cursor:pointer;color:#050015;
  font-weight:600;font-size:.9rem;
  transition:.3s;
}
.actions button:hover{
  transform:translateY(-4px);
}

#zepAIButton{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  border-radius:50%;
  border:none;
  font-size:24px;
  cursor:pointer;
  background:linear-gradient(135deg,var(--zep-blue),var(--zep-violet));
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}

@media(max-width:480px){
  .profile-summary{flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="logo.png">
    Zep Swipe
  </div>
  <button class="logout-btn" onclick="logout()">⎋</button>
</header>

<div class="dashboard">

<div class="section profile-summary">
  <img id="profileImg" src="">
  <div class="profile-info">
    <h3 id="studentName">Student <span id="verifiedBadge" style="display:none;" class="verified-badge"></span></h3>
    <div id="studentLevel">Beginner Freelancer</div>
    <div id="completionText">Profile Completion: 0%</div>
    <div id="walletBalance">Wallet: 0 ZAC (~$0)</div>

    <div style="margin-top:10px;">Freelancer Readiness Score</div>
    <div class="meter">
      <div class="meter-fill" id="readinessFill"></div>
    </div>
  </div>
</div>

<div class="section">
  <h3>Weekly Earnings</h3>
  <div class="graph-box" id="weeklyGraph"></div>
</div>

<div class="section actions">
  <button onclick="location.href='learn-earn.html'">📚 Earn & Verify</button>
  <button onclick="location.href='swipe-merchants.html'">💼 Jobs</button>
  <button onclick="location.href='wallet.html'">💰 Wallet</button>
  <button onclick="location.href='profile.html'">👤 Profile</button>
  <button onclick="location.href='deals.html'">🎉 Deals</button>
</div>

</div>

<button id="zepAIButton" onclick="location.href='zep-ai.html'">🤖</button>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) location.href="login.html";
let currentUser = users[currentUserId];

function logout(){
  localStorage.removeItem("currentUserId");
  location.href="login.html";
}

const profileImg = document.getElementById("profileImg");
const studentName = document.getElementById("studentName");
const studentLevel = document.getElementById("studentLevel");
const completionText = document.getElementById("completionText");
const walletBalance = document.getElementById("walletBalance");
const verifiedBadge = document.getElementById("verifiedBadge");
const readinessFill = document.getElementById("readinessFill");

profileImg.src = currentUser.profileImage || "https://via.placeholder.com/80";
studentName.innerText = currentUser.name || "Student";
studentLevel.innerText = currentUser.level || "Beginner Freelancer";

function calculateCompletion(){
  const learnData = currentUser.learnEarnProgress || {};
  let totalTasks = 0;
  let completed = 0;

  Object.values(learnData).forEach(course=>{
    totalTasks += 21;
    completed += course.completedDays?.length || 0;
  });

  const percent = totalTasks ? Math.round((completed/totalTasks)*100) : 0;
  currentUser.profileCompletion = percent;
  return percent;
}

function updateWalletLive(){
  let newBalance = currentUser.walletBalance || 0;
  walletBalance.innerText = `Wallet: ${newBalance} ZAC (~$${(newBalance*0.014).toFixed(2)})`;

  if(window.lastBalance && newBalance > window.lastBalance){
    walletBalance.classList.add("wallet-glow");
    setTimeout(()=>walletBalance.classList.remove("wallet-glow"),1000);
  }
  window.lastBalance = newBalance;
}

function calculateReadiness(){
  const completion = currentUser.profileCompletion || 0;
  const verified = currentUser.verified ? 20 : 0;
  const walletPower = Math.min((currentUser.walletBalance||0)/10,20);
  const score = Math.min(completion + verified + walletPower,100);
  readinessFill.style.width = score + "%";
}

function updateDashboard(){
  let percent = calculateCompletion();
  completionText.innerText = `Profile Completion: ${percent}%`;
  if(percent >= 80) {
    verifiedBadge.style.display = "inline-block";
    currentUser.verified = true;
  }
  updateWalletLive();
  calculateReadiness();
  users[currentUserId] = currentUser;
  localStorage.setItem("users", JSON.stringify(users));
}

updateDashboard();

window.addEventListener("storage", ()=>{
  users = JSON.parse(localStorage.getItem("users")) || {};
  currentUser = users[currentUserId];
  updateDashboard();
});

const weeklyGraph = document.getElementById("weeklyGraph");
const earnings = currentUser.earningsHistory || [5,10,15,8,20,12,25];
earnings.forEach(val=>{
  const bar = document.createElement("div");
  bar.className="graph-bar";
  bar.style.height = val*4 + "px";
  weeklyGraph.appendChild(bar);
});
</script>

</body>
</html>
