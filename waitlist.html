<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Swipe – Learn & Earn</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0A0F2C, #1A2AFF);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-top: 20px;
}

p {
  opacity: 0.85;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 18px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

button {
  background: #FFD700;
  font-weight: bold;
  cursor: pointer;
}

.step { display: none; }
.step.active { display: block; }

.progress {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 6px;
  background: #FFD700;
  width: 25%;
  border-radius: 10px;
  transition: 0.3s;
}

.success {
  display: none;
}

.ref-box {
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  word-break: break-all;
}

.small {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>📱 Your Phone Should Pay You</h1>
<p>Learn skills. Earn daily. Withdraw instantly.</p>

<div class="card" id="formCard">

<div class="progress">
  <div id="bar" class="progress-bar"></div>
</div>

<!-- STEP 1 -->
<div class="step active">
<input id="name" placeholder="Your Name">
<input id="country" placeholder="Country">
<input id="university" placeholder="University">
<button onclick="nextStep()">Continue</button>
</div>

<!-- STEP 2 -->
<div class="step">
<p>What do you want from Zep Swipe?</p>
<select id="intent">
<option>Learn & Earn</option>
<option>Freelancing</option>
<option>Referrals</option>
</select>
<button onclick="nextStep()">Continue</button>
</div>

<!-- STEP 3 -->
<div class="step">
<p>How would you like to withdraw?</p>
<select id="payout">
<option>Mobile Money</option>
<option>Bank</option>
<option>Crypto</option>
</select>

<select id="provider">
<option>MTN MoMo</option>
<option>Vodacom M-Pesa</option>
<option>Airtel Money</option>
</select>

<button onclick="nextStep()">Continue</button>
</div>

<!-- STEP 4 -->
<div class="step">
<p>Are you ready to start earning?</p>
<select id="readiness">
<option>Ready Now 🔥</option>
<option>Interested</option>
<option>Just Exploring</option>
</select>

<button onclick="submitForm()">Join Waitlist 🚀</button>
</div>

</div>

<!-- SUCCESS SCREEN -->
<div class="card success" id="successCard">
<h2>🚀 You're In!</h2>
<p>Invite 5 friends to unlock early access</p>

<div class="ref-box" id="refLinkBox"></div>

<p class="small">Share your link on WhatsApp, Telegram, campus groups</p>

<button onclick="copyLink()">Copy Link</button>
</div>

</div>

<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let step = 0;
const steps = document.querySelectorAll(".step");

function nextStep() {
  steps[step].classList.remove("active");
  step++;
  steps[step].classList.add("active");

  document.getElementById("bar").style.width = ((step+1)*25)+"%";
}

function generateCode() {
  return Math.random().toString(36).substring(2,8);
}

async function submitForm() {

  const referralCode = generateCode();
  const params = new URLSearchParams(window.location.search);
  const referredBy = params.get("ref");

  const { error } = await client
    .from("waitlist_users")
    .insert([{
      name: document.getElementById("name").value,
      country: document.getElementById("country").value,
      university: document.getElementById("university").value,
      intent: document.getElementById("intent").value,
      payout_method: document.getElementById("payout").value,
      provider: document.getElementById("provider").value,
      readiness: document.getElementById("readiness").value,
      referral_code: referralCode,
      referred_by: referredBy
    }]);

  if (!error) {
    document.getElementById("formCard").style.display = "none";
    document.getElementById("successCard").style.display = "block";

    const link = window.location.origin + "?ref=" + referralCode;
    document.getElementById("refLinkBox").innerText = link;
  } else {
    alert("Something went wrong. Try again.");
  }
}

function copyLink() {
  const text = document.getElementById("refLinkBox").innerText;
  navigator.clipboard.writeText(text);
  alert("Link copied!");
}
</script>

</body>
</html>
