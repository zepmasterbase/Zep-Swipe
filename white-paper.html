<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zep Cash (ZAC) — Web3 Student Economy</title>

<link rel="icon" href="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jfnua21qtu1vi2pfom33b641h.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --bg:#050010;
  --glass:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background: radial-gradient(circle at 20% 10%, #070018, #000010);
  color:white;
  overflow-x:hidden;
}

/* THREE BACKGROUND */
#three-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
  animation:glow 6s infinite;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 10px rgba(0,240,255,.05);}
  50%{box-shadow:0 0 25px rgba(156,77,255,.25);}
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo span{
  font-family:Orbitron;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px 30px;
}

.hero h1{
  font-family:Orbitron;
  font-size:3rem;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  max-width:1100px;
  margin:20px auto;
  padding:0 20px;
}

.card{
  background:var(--glass);
  border:1px solid var(--border);
  padding:18px;
  border-radius:14px;
  backdrop-filter:blur(10px);
  transition:.3s;
  text-align:center;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(0,240,255,.15);
}

/* CHART */
.chart-box{
  max-width:900px;
  margin:40px auto;
  background:var(--glass);
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
  backdrop-filter:blur(10px);
}

/* AI SECTION */
.ai-box{
  max-width:900px;
  margin:40px auto;
  padding:20px;
  background:var(--glass);
  border-radius:14px;
  border:1px solid var(--border);
}

.ai-input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.4);
  color:white;
}

.ai-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  cursor:pointer;
}

.response{
  margin-top:15px;
  padding:10px;
  border-left:2px solid var(--blue);
  color:rgba(255,255,255,.85);
}
</style>
</head>

<body>

<canvas id="three-bg"></canvas>

<header>
  <div class="logo">
    <img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jhp2503i1gm41unj1tlt1me117of15.png" width="40">
    <span>Zep Cash</span>
  </div>
</header>

<section class="hero">
  <h1>Web3 Student Economy Protocol</h1>
  <p>Zukma Network powers real utility for freelancers, students & digital earners.</p>
</section>

<!-- TOKEN DASHBOARD -->
<section class="dashboard">

  <div class="card">
    <i data-lucide="coins"></i>
    <h3>Supply</h3>
    <p id="supply">1,000,000,000 ZAC</p>
  </div>

  <div class="card">
    <i data-lucide="trending-up"></i>
    <h3>Price</h3>
    <p id="price">$0.041</p>
  </div>

  <div class="card">
    <i data-lucide="banknote"></i>
    <h3>Market Cap</h3>
    <p>$41,000,000</p>
  </div>

  <div class="card">
    <i data-lucide="activity"></i>
    <h3>Network Status</h3>
    <p>LIVE</p>
  </div>

</section>

<!-- CHART -->
<section class="chart-box">
  <canvas id="chart"></canvas>
</section>

<!-- AI WHITEPAPER EXPLAINER -->
<section class="ai-box">
  <h2>🧠 Zep AI Whitepaper Assistant</h2>
  <input class="ai-input" id="question" placeholder="Ask about Zep Cash, Zukma Network, token utility...">
  <button class="ai-btn" onclick="askAI()">Ask Protocol</button>
  <div class="response" id="response"></div>
</section>

<script>
lucide.createIcons();

/* FAKE AI */
function askAI(){
  const q = document.getElementById("question").value;
  document.getElementById("response").innerText =
  "Zep AI Protocol: " + q + " relates to Zep Cash utility across Zep Swipe, Campus Wave and the Zukma Network ecosystem.";
}

/* CHART */
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ["Day 1","Day 2","Day 3","Day 4","Day 5","Day 6"],
    datasets: [{
      label: "ZAC Price Movement",
      data: [0.01,0.02,0.03,0.028,0.035,0.041],
      borderColor: "#00f0ff",
      tension: 0.4
    }]
  }
});

/* THREE JS BACKGROUND */
const canvas = document.getElementById("three-bg");
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

camera.position.z = 5;

const geometry = new THREE.BufferGeometry();
const particles = 800;
const positions = [];

for(let i=0;i<particles;i++){
  positions.push((Math.random()-0.5)*10);
  positions.push((Math.random()-0.5)*10);
  positions.push((Math.random()-0.5)*10);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({color:0x00f0ff, size:0.02});
const points = new THREE.Points(geometry, material);
scene.add(points);

function animate(){
  requestAnimationFrame(animate);
  points.rotation.y += 0.0015;
  points.rotation.x += 0.0005;
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
